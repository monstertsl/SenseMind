# SenseMind 规则抑制（suricata-update --disable-conf 读取；改本文件重跑 deploy.sh 即生效）
# 语法：re:<正则> 按整行匹配(msg前缀)禁用；直接写 <sid> 禁用单条（不支持 id: 前缀）
# 注：本环境规则无 group: 元数据，故按 msg 前缀(re:)等效按组禁用。

# === 整组禁用（ET msg 前缀与组一一对应）===
re:ET INFO
re:ET SCAN
re:ET JA3
# et/open 自带协议异常噪声；必须锚定 msg:"SURICATA 前缀，避免误伤 stamus/lateral
re:msg:"SURICATA
# ET 狩猎类，误报偏高
re:ET HUNTING
# ET 已退役（不再维护）规则
re:ET RETIRED

# === 单条高误报规则（直接写 sid 数字，勿用 id: 前缀）===
# TGI HUNT SMB 暴力破解
2610580
# ET WEB_SPECIFIC_APPS Apache ActiveMQ 6.x CVE-2024-32114 M2 高误报
2069476

# === 历史噪音抑制 ===
re:ET DNS Query for \.cc TLD
re:ET DNS Query to a .*(top|pw|tk) domain
re:ET P2P (BitTorrent|Vuze|Edonkey)
re:ET USER_AGENTS Microsoft Device Metadata
