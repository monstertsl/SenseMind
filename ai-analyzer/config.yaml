# SenseMind AI 分析中心配置文件

########################################
# LLM 模型配置
########################################
llm:

  api_key: "sk-xxx"

  base_url: "https://..."

  model: "glm-5.2"

  # 生成参数
  temperature: 0.1
  max_tokens: 8000
  # 单次请求超时（秒），需大于 Logstash request_timeout
  timeout: 60

########################################
# 威胁情报查询配置
# 默认关闭，不影响现有流程
# 启用时需配置 api_url 和 api_key
########################################
threat_intel:
  enabled: false
  # 查询接口 URL，可用 {type}（ip/domain）和 {value} 占位符
  # 示例: "http://10.0.0.1:8080/api/query?type={type}&value={value}"
  api_url: ""
  # API Key，留空则不传
  api_key: ""
  # API Key 传递方式: header 或 query
  api_key_in: "header"
  # API Key 的 header/参数名
  api_key_name: "x-apikey"
  # 请求超时（秒）
  timeout: 10
  # 响应字段提取（jq 语法），留空返回原始 JSON
  jq_filter: ""

########################################
# Elasticsearch 配置
########################################
elasticsearch:
  # ES 地址（容器内通过服务名访问）
  hosts: "https://elasticsearch:9200"
  # CA 证书路径（容器内）
  ca_cert: "/usr/share/ai-analyzer/certs/ca.crt"
  # 凭据 - 从环境变量读取（部署时由 docker-compose 注入）
  # ELASTIC_PASSWORD 由 .env 提供
  username: "elastic"
  password_env: "ELASTIC_PASSWORD"

  # 告警源索引模式
  alert_index: "soc-*"
  # 分析结果写入索引
  result_index: "soc-ai-%{date}"

  # 关联查询配置
  correlation:
    # 按 community_id 关联的日志条数上限
    max_related_logs: 20
  # 回退到 IP+时间窗口关联时的窗口（秒）
  time_window_seconds: 300

########################################
# Redis 缓存配置（查询 API 加速层）
########################################
redis:
  host: "redis"
  port: 6379
  db: 0
  # 密码从环境变量读取，留空则无密码
  password_env: "REDIS_PASSWORD"
  # 默认 TTL（秒），具体键可单独覆盖
  default_ttl: 30

########################################
# Webhook 配置
########################################
webhook:
  host: "0.0.0.0"
  port: 9090

########################################
# 知识库配置 (RAG 检索源)
# 目录结构：
#   knowledge/
#   ├── mitre-attack/     # MITRE ATT&CK 技术说明 (.md)
#   ├── soc-playbook/     # SOC 处置手册 (.md)
#   └── suricata-rules/   # Suricata 规则说明 (.md)
########################################
knowledge:
  dir: "/usr/share/ai-analyzer/knowledge"

########################################
# Suricata 规则自动生成配置
# 当 AI 确认攻击但原始告警未触发 soc.matched 时，
# 自动生成低误报率规则写入 local.rules 并热加载。
########################################
suricata:
  enabled: true
  # local.rules 文件路径（容器内，对应宿主机 /data/suricata/lib/rules/local.rules）
  rules_file: "/suricata/rules/local.rules"
  # suricata 容器名称（用于 docker exec suricatasc 热加载规则）
  suricata_container: "suricata"

########################################
# 告警去重配置
# 同一 community_id + signature_id 在时间窗口内只分析一次
########################################
dedup:
  enabled: true
  # 去重时间窗口（秒），默认 600 = 10 分钟
  window_seconds: 600
  # 内存缓存最大条数（LRU 淘汰）
  max_entries: 10000
