# SenseMind AI 分析中心配置文件

########################################
# LLM 模型配置
########################################
llm:

  api_key: "sk-ws-H.RPEXXLX.b2fK.MEUCIQCEpxCEOCcOVvhkDtOCrCgRg42HlxpAtddxI6vY_p4segIgDmr3sWBgWpSMsoO0V9jWpi6n54w2L_4eQkBqCA7vBcA"

  base_url: "https://llm-fnu33c36r9mt0vzk.cn-beijing.maas.aliyuncs.com/compatible-mode/v1"

  model: "glm-5.2"

  # 生成参数
  temperature: 0.1
  max_tokens: 2000

########################################
# Elasticsearch 配置
########################################
elasticsearch:
  # ES 地址（容器内通过服务名访问）
  hosts: "https://elasticsearch:9200"
  # CA 证书路径（容器内）
  ca_cert: "/usr/share/ai-analyzer/certs/ca.crt"
  # 凭据 - 从环境变量读取（部署时由 docker-compose 注入）
  # ELASTIC_PASSWORD 由 .env 提供
  username: "elastic"
  password_env: "ELASTIC_PASSWORD"

  # 告警源索引模式
  alert_index: "soc-*"
  # 分析结果写入索引
  result_index: "soc-ai-%{date}"

  # 关联查询配置
  correlation:
    # 按 community_id 关联的日志条数上限
    max_related_logs: 20
    # 回退到 IP+时间窗口关联时的窗口（秒）
    time_window_seconds: 300

########################################
# Webhook 配置
########################################
webhook:
  host: "0.0.0.0"
  port: 9090
