input {
  beats {
    port => 5044
  }
}

filter {

  ########################################
  # 1. 丢弃 Suricata stats 事件（纯性能统计，无安全价值）
  ########################################

  if [event][module] == "suricata" and [suricata][eve][event_type] == "stats" {
    drop {}
  }

  ########################################
  # 2. 标识数据源 observer.type
  #    Filebeat modules 已完成 ECS 五元组/community_id 转换
  ########################################

  if [event][module] == "suricata" {
    mutate {
      add_field => { "observer.type" => "suricata" }
      add_field => { "event.kind"    => "event" }
    }
    # alert 事件标记为告警
    if [suricata][eve][event_type] == "alert" {
      mutate {
        replace => { "event.kind" => "alert" }
      }
    }
  }

  if [event][module] == "zeek" {
    mutate {
      add_field => { "observer.type" => "zeek" }
    }
  }

  ########################################
  # 3. 时间统一 @timestamp（使用事件实际时间，非接收时间）
  #    Suricata: suricata.eve.timestamp
  #    Zeek:     zeek.{connection,dns,http,ssl}.ts
  ########################################

  if [suricata][eve][timestamp] {
    date {
      match => ["[suricata][eve][timestamp]", "ISO8601"]
      target => "@timestamp"
      tag_on_failure => []
    }
  } else if [zeek][connection][ts] {
    date {
      match => ["[zeek][connection][ts]", "ISO8601"]
      target => "@timestamp"
      tag_on_failure => []
    }
  } else if [zeek][dns][ts] {
    date {
      match => ["[zeek][dns][ts]", "ISO8601"]
      target => "@timestamp"
      tag_on_failure => []
    }
  } else if [zeek][http][ts] {
    date {
      match => ["[zeek][http][ts]", "ISO8601"]
      target => "@timestamp"
      tag_on_failure => []
    }
  } else if [zeek][ssl][ts] {
    date {
      match => ["[zeek][ssl][ts]", "ISO8601"]
      target => "@timestamp"
      tag_on_failure => []
    }
  }

  ########################################
  # 4. 删除不需要的字段（不过度裁剪，仅删纯性能/调试字段）
  ########################################

  # Suricata: 删除 packet/raw/payload(hex)、decoder、stats 内部字段
  if [event][module] == "suricata" {
    mutate {
      remove_field => [
        "[suricata][eve][packet]",
        "[suricata][eve][packet_info]",
        "[suricata][eve][payload]",
        "[suricata][eve][raw]",
        "[suricata][eve][ethernet]",
        "[suricata][eve][decoder]",
        "[suricata][eve][stats]"
      ]
    }
  }

  # Zeek: 删除调试字段
  if [event][module] == "zeek" {
    mutate {
      remove_field => [
        "[zeek][connection][local_orig]",
        "[zeek][connection][local_resp]",
        "[zeek][connection][missed_bytes]"
      ]
    }
  }

  ########################################
  # 5. 通用清理（Filebeat 元数据）
  ########################################

  mutate {
    remove_field => [
      "agent",
      "ecs",
      "input",
      "log",
      "host",
      # Filebeat Suricata 模块会同时写入 source.ip 和 source.address（值相同），
      # 删除冗余的 address 字段，避免 ES 中出现重复字段
      "[source][address]",
      "[destination][address]"
    ]
  }

  ########################################
  # 6. SOC 重点安全检测分类
  #    加载 soc_categories.json 做两层匹配：
  #      a) alert.category 精确匹配
  #      b) alert.signature 关键词模糊匹配（不区分大小写）
  #    命中则打 soc.* 标签，后续 http output 仅推送命中的重点告警
  ########################################

  if [event][module] == "suricata" and [suricata][eve][event_type] == "alert" {
    ruby {
      init => 'require "json"; $soc_map = JSON.parse(File.read("/usr/share/logstash/config/soc_categories.json"))'
      code => '
        alert_category = event.get("[suricata][eve][alert][category]")
        signature = event.get("[suricata][eve][alert][signature]")
        matched = nil

        # a) 关键词模糊匹配 alert.signature（优先，因为signature更具体）
        #    收集所有命中规则，取关键词最长的那条（更具体优先）
        #    如 "log4j RCE" 同时命中 01_web_attack 的 "rce" 和 04_exploit 的 "log4j"
        #    "log4j"(5字符) 比 "rce"(3字符) 更具体，应归类为 04_exploit
        if signature
          sig_lower = signature.downcase
          best_kw_len = 0
          $soc_map["signature_keywords"].each do |rule|
            rule["keywords"].each do |kw|
              if sig_lower.include?(kw) && kw.length > best_kw_len
                matched = rule
                best_kw_len = kw.length
              end
            end
          end
        end

        # b) 精确匹配 alert.category（fallback，signature未命中时按category分类）
        if !matched && alert_category && $soc_map["category_exact"] && $soc_map["category_exact"][alert_category]
          matched = $soc_map["category_exact"][alert_category]
        end

        if matched
          event.set("[soc][category]", matched["soc_category"])
          event.set("[soc][name]", matched["soc_name"])
          event.set("[soc][mitre_id]", matched["mitre_id"])
          event.set("[soc][stage]", matched["stage"])
          event.set("[soc][matched]", true)
        else
          event.set("[soc][matched]", false)
        end
      '
    }
  }
}

########################################
# OUTPUT
########################################

output {

  elasticsearch {
    hosts => ["https://elasticsearch:9200"]

    ssl => true
    cacert => "/usr/share/logstash/config/certs/ca.crt"
    api_key => "${LOGSTASH_API_KEY}"

    index => "soc-%{+YYYY.MM.dd}"
  }

  # 推送匹配 SOC 重点分类的告警到 AI 推送管道（独立pipeline，不影响ES写入）
  if [soc][matched] {
    pipeline {
      send_to => "ai-push"
    }
  }

  stdout {
    codec => rubydebug
  }
}
