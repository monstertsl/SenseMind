# AI推送管道 - 独立pipeline，不影响ES写入
# 从主管道的 output 队列接收 matched 告警，异步推送到 AI 分析中心

input {
  # 从主管道接收数据（通过 pipeline-to-pipeline 通信）
  pipeline {
    address => "ai-push"
  }
}

output {
  http {
    url => "${AI_ANALYZER_URL}"
    http_method => "post"
    format => "json"
    content_type => "application/json"
    retry_failed => false
    request_timeout => 90
    connect_timeout => 5
    socket_timeout => 90
  }
}
