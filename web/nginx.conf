server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ===== IP 白名单拦截（auth_request 子请求到后端）=====
    # 每个请求先由后端检查客户端 IP 是否在白名单中
    # 200 = 放行，403 = 拦截
    auth_request /_check_ip;
    error_page 403 = @ip_blocked;

    location = /_check_ip {
        internal;
        proxy_pass http://ai-analyzer:9090/api/v1/auth/check-ip;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
    }

    location @ip_blocked {
        return 444;
    }

    # ===== 单页应用路由回退 =====
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===== 静态资源缓存 =====
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ===== API 反向代理到 ai-analyzer =====
    location /api/ {
        proxy_pass http://ai-analyzer:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ===== gzip =====
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
