server {
    listen 443 ssl;
    server_name _;

    # ===== HTTPS 证书（由 deploy.sh 用 ES CA 签发，挂载自 certs/）=====
    ssl_certificate /etc/nginx/ssl/web.crt;
    ssl_certificate_key /etc/nginx/ssl/web.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_session_cache shared:SSL:1m;
    ssl_session_timeout 10m;

    root /usr/share/nginx/html;
    index index.html;

    # ===== IP 白名单拦截（auth_request 子请求到后端）=====
    # 每个请求先由后端检查客户端 IP 是否在白名单中
    # 200 = 放行，403 = 拦截
    auth_request /_check_ip;
    error_page 403 = @ip_blocked;

    location = /_check_ip {
        internal;
        proxy_pass http://ai-analyzer:9090/api/v1/auth/check-ip;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Host $host;
        proxy_connect_timeout 2s;
        proxy_read_timeout 3s;
    }

    location @ip_blocked {
        return 444;
    }

    # ===== 单页应用路由回退 =====
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ===== 静态资源缓存 =====
    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff2?|ico)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ===== AI 研判（手动触发分析）专用代理 =====
    # 该接口需执行多阶段 LLM 链，耗时远超普通 API，需单独放大超时
    # LLM timeout 最大 300s/次 × 最多2次调用 = 600s，网关须 >= 600s
    location ^~ /api/v1/analyze/ {
        proxy_pass http://ai-analyzer:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
    }

    # ===== API 反向代理到 ai-analyzer =====
    location /api/ {
        proxy_pass http://ai-analyzer:9090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ===== gzip =====
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;
}
