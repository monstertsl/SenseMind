name: sensemind

networks:
  elastic:
    driver: bridge

volumes:
  esdata:
  filebeat-data:
  pgdata:

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.19.16
    container_name: elasticsearch
    restart: unless-stopped

    environment:
      - node.name=soc-node
      - cluster.name=soc-cluster
      - discovery.type=single-node
      - ingest.geoip.downloader.enabled=false
      - bootstrap.memory_lock=true
      - ES_JAVA_OPTS=-Xms2g -Xmx2g
      - xpack.security.enabled=true
      - xpack.security.http.ssl.enabled=true
      - xpack.security.http.ssl.keystore.path=elastic-certificates.p12
      - xpack.security.transport.ssl.enabled=true
      - xpack.security.transport.ssl.keystore.path=elastic-certificates.p12
      # 首次启动时以此引导 elastic 用户密码；后续启动 ES 会忽略此变量
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}

    ulimits:
      memlock:
        soft: -1
        hard: -1

    ports:
      - "127.0.0.1:9200:9200"

    volumes:
      - esdata:/usr/share/elasticsearch/data
      - ./certs/elastic-certificates.p12:/usr/share/elasticsearch/config/elastic-certificates.p12:ro

    networks:
      - elastic
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9200' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  suricata:
    image: jasonish/suricata:latest
    container_name: suricata
    restart: unless-stopped
    network_mode: host

    environment:
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}

    cap_add:
      - NET_ADMIN
      - NET_RAW
      - SYS_NICE

    volumes:
      - /data/suricata/logs:/var/log/suricata
      - /data/suricata/lib:/var/lib/suricata
      - /data/suricata/etc:/etc/suricata

    command:
      - -i
      - ${INTERFACE:-ens192}

  zeek:
    image: zeek/zeek:latest
    container_name: zeek
    restart: unless-stopped
    network_mode: host
    user: root
    working_dir: /opt/logs

    cap_add:
      - NET_ADMIN
      - NET_RAW

    volumes:
      - /data/zeek/logs:/opt/logs

    command:
      - zeek
      - -i
      - ${INTERFACE:-ens192}
      - policy/tuning/json-logs
      - policy/protocols/conn/community-id-logging
      - LogAscii::json_timestamps=JSON::TS_ISO8601

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.19.16
    container_name: filebeat
    user: root
    restart: unless-stopped

    depends_on:
      logstash:
        condition: service_started

    networks:
      - elastic

    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /data/suricata/logs:/var/log/suricata:ro
      - /data/zeek/logs:/var/log/zeek:ro
      - filebeat-data:/usr/share/filebeat/data

    # 等待 Logstash 5044 端口就绪后再启动 Filebeat
    entrypoint: >
      bash -c "
      echo '[*] 等待 logstash:5044 就绪...';
      until bash -c 'echo > /dev/tcp/logstash/5044' 2>/dev/null; do
        echo '[-] logstash:5044 未就绪，3秒后重试...';
        sleep 3;
      done;
      echo '[+] logstash:5044 已就绪，启动 filebeat';
      exec /usr/bin/tini -- /usr/local/bin/docker-entrypoint --strict.perms=false;
      "

  logstash:
    image: docker.elastic.co/logstash/logstash:8.19.16
    container_name: logstash
    restart: unless-stopped

    ports:
      - "5044:5044"

    volumes:
      - ./logstash/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
      - ./logstash/pipelines.yml:/usr/share/logstash/config/pipelines.yml:ro
      - ./logstash/logstash.conf:/usr/share/logstash/pipeline/logstash.conf:ro
      - ./logstash/ai-push.conf:/usr/share/logstash/pipeline/ai-push.conf:ro
      - ./logstash/soc_categories.json:/usr/share/logstash/config/soc_categories.json:ro
      - ./certs/ca.crt:/usr/share/logstash/config/certs/ca.crt:ro

    environment:
      - LOGSTASH_API_KEY=${LOGSTASH_API_KEY}
      - AI_ANALYZER_URL=http://ai-analyzer:9090/api/alert
      - LS_JAVA_OPTS=-Xms1g -Xmx1g

    networks:
      - elastic

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly no
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - elastic
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: sensemind-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${ELASTIC_PASSWORD}
      - POSTGRES_DB=sensemind
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sensemind"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - elastic

  ai-analyzer:
    build:
      context: ./ai-analyzer
      dockerfile: Dockerfile
    image: sensemind/ai-analyzer:latest
    container_name: ai-analyzer
    restart: unless-stopped

    ports:
      - "127.0.0.1:9090:9090"

    volumes:
      - ./ai-analyzer/config.yaml:/usr/share/ai-analyzer/config.yaml:ro
      - ./ai-analyzer/knowledge:/usr/share/ai-analyzer/knowledge:ro
      - ./certs/ca.crt:/usr/share/ai-analyzer/certs/ca.crt:ro
      - /data/suricata/lib/rules:/suricata/rules:rw
      - /data/suricata/logs:/data/suricata/logs:rw
      - /data/zeek/logs:/data/zeek/logs:rw
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      - ELASTIC_PASSWORD=${ELASTIC_PASSWORD}
      # 专用 API Key（只读，仅授权 soc-* / soc-ai-* 索引），查询 API 优先使用
      - ES_READER_API_KEY=${ES_READER_API_KEY}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      # PostgreSQL 连接（复用 ELASTIC_PASSWORD 作为 postgres 密码）
      - DATABASE_URL=postgresql+psycopg2://postgres:${ELASTIC_PASSWORD}@postgres:5432/sensemind
      # JWT 签名密钥（deploy.sh 生成，不可变更）
      - SECRET_KEY=${SECRET_KEY}
      # TOTP secret 加密密钥（deploy.sh 生成，不可变更）
      - ENCRYPT_KEY=${ENCRYPT_KEY}

    depends_on:
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

    networks:
      - elastic

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: sensemind/web:latest
    container_name: sensemind-web
    restart: unless-stopped

    ports:
      - "8080:80"

    depends_on:
      - ai-analyzer

    networks:
      - elastic